name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: quarterback
          POSTGRES_USER: quarterback
          POSTGRES_PASSWORD: quarterback
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U quarterback -d quarterback"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://quarterback:quarterback@localhost:55432/quarterback
      TEST_DATABASE_URL: postgresql://quarterback:quarterback@localhost:55432/quarterback

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build:web
