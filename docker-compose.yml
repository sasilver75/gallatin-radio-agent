services:
  postgis:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: gallatin-radio-agent-postgis
    environment:
      POSTGRES_DB: quarterback
      POSTGRES_USER: quarterback
      POSTGRES_PASSWORD: quarterback
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarterback -d quarterback"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - gallatin_postgis_data:/var/lib/postgresql/data

volumes:
  gallatin_postgis_data:
